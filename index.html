// ─── Date/Format helpers ───
const MO={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

// Extract value from Google Sheets IFERROR(DUMMYFUNCTION(...), "actual_value")
function extractCell(v) {
  if (v == null) return "";
  const s = String(v);
  // Google Sheets QUERY formula: =IFERROR(__xludf.DUMMYFUNCTION("COMPUTED_VALUE"), "actual")
  const m = s.match(/DUMMYFUNCTION\([^)]*\)\s*,\s*(.+?)\s*\)$/);
  if (m) {
    let val = m[1].trim();
    if (val.startsWith('"') && val.endsWith('"')) return val.slice(1,-1); // string value
    return parseFloat(val) || val; // numeric value
  }
  return v; // not a formula, return as-is
}

function parseDate(s){
  if(!s) return null;
  // Already a Date object (from SheetJS cellDates:true)
  if(s instanceof Date && !isNaN(s.getTime())) return s;
  // Excel serial number (e.g. 46025 = Jan 3, 2026)
  const num = typeof s === "number" ? s : parseFloat(String(s).trim());
  if (!isNaN(num) && num > 40000 && num < 60000) {
    // Use UTC to avoid timezone shift
    const d = new Date(Date.UTC(1899, 11, 30 + Math.round(num)));
    if (!isNaN(d.getTime())) return d;
  }
  const str = String(s).trim();
  // "10 Mar 2026" format
  const m = str.match(/^(\d{1,2})\s+([a-z]+)\s+(\d{4})$/i);
  if(m){const mo=MO[m[2].slice(0,3).toLowerCase()];if(mo!==undefined)return new Date(+m[3],mo,+m[1]);}
  // "03/01/2026" DD/MM/YYYY or MM/DD/YYYY — try both
  const slash = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(slash){
    const a=+slash[1], b=+slash[2], y=+slash[3];
    // If first number > 12, it must be DD/MM
    if(a>12) return new Date(y,b-1,a);
    // If second number > 12, it must be MM/DD
    if(b>12) return new Date(y,a-1,b);
    // Ambiguous — assume DD/MM (Indonesian format)
    return new Date(y,b-1,a);
  }
  // "2026-01-03" ISO format
  const d=new Date(str);return isNaN(d.getTime())?null:d;
}
// Use local time getters consistently
function fmtD(d){
  return d.getDate()+" "+["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"][d.getMonth()];
}
function dk(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function fmt(n){if(!isFinite(n)||isNaN(n))return n===Infinity?"∞":"-";return n.toLocaleString("id-ID",{maximumFractionDigits:1});}
function parseRp(s){if(typeof s==="number")return Math.round(s);const str=String(s||"").trim().replace(/[,\.]\d{2}$/,"").replace(/[^0-9]/g,"");return parseInt(str)||0;}
const DAYS=["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

function kingFormula(arr,aLT,mLT,stk){
  if(!arr.length)return{avg:0,max:0,ss:0,rop:0,oq:0,dos:Infinity,belowRop:false};
  const avg=arr.reduce((a,b)=>a+b,0)/arr.length;const max=arr.reduce((m,v)=>v>m?v:m,0);
  const ss=Math.max(Math.ceil(max*mLT-avg*aLT),0);const rop=Math.ceil(avg*aLT+ss);
  const dos=avg>0?stk/avg:Infinity;const belowRop=stk<=rop;
  const oq=belowRop?Math.max(Math.ceil(avg*(mLT+1)+ss-stk),0):0;
  return{avg,max,ss,rop,oq,dos,belowRop};
}

// ─── Smart Statistics: Trend + Anomaly + Adjusted Qty ───
function analyzeTrend(arr, avgLT, maxLT, stock) {
  if (arr.length < 3) return { trend: "—", slope: 0, anomaly: null, adjQty: 0, forecast: 0 };
  const n = arr.length;

  // Linear regression: y = a + b*x
  let sx=0,sy=0,sxx=0,sxy=0;
  for(let i=0;i<n;i++){ sx+=i; sy+=arr[i]; sxx+=i*i; sxy+=i*arr[i]; }
  const slope = (n*sxy - sx*sy) / (n*sxx - sx*sx);
  const intercept = (sy - slope*sx) / n;

  // Trend direction
  const avgVal = sy / n;
  const slopeRatio = avgVal > 0 ? Math.abs(slope) / avgVal : 0;
  let trend = "→"; // stabil
  if (slopeRatio > 0.05) trend = slope > 0 ? "↗" : "↘";
  if (slopeRatio > 0.15) trend = slope > 0 ? "⬆" : "⬇";

  // Anomaly detection: z-score of last value
  const stdev = Math.sqrt(arr.reduce((a,v) => a + (v-avgVal)**2, 0) / n);
  const lastVal = arr[n-1];
  let anomaly = null;
  if (stdev > 0) {
    const z = (lastVal - avgVal) / stdev;
    if (z > 2) anomaly = { type: "spike", icon: "🔺", msg: "Spike: penjualan terakhir " + lastVal + " (avg " + fmt(avgVal) + ")", severity: "high" };
    else if (z > 1.5) anomaly = { type: "above", icon: "📈", msg: "Di atas rata-rata: " + lastVal + " vs avg " + fmt(avgVal), severity: "med" };
    else if (z < -1.5) anomaly = { type: "drop", icon: "📉", msg: "Drop: penjualan turun ke " + lastVal + " (avg " + fmt(avgVal) + ")", severity: "med" };
  }

  // Forecast: projected next day value using regression
  const forecast = Math.max(intercept + slope * n, 0);

  // Adjusted order qty: use forecast instead of flat avg
  const adjAvg = (avgVal + forecast) / 2; // blend avg with forecast
  const max = arr.reduce((m,v)=>v>m?v:m,0);
  const ss = Math.max(Math.ceil(max * maxLT - adjAvg * avgLT), 0);
  const rop = Math.ceil(adjAvg * avgLT + ss);
  const belowRop = stock <= rop;
  const adjQty = belowRop ? Math.max(Math.ceil(adjAvg * (maxLT + 1) + ss - stock), 0) : 0;

  return { trend, slope, anomaly, adjQty, forecast, adjAvg, adjRop: rop, adjBelowRop: belowRop };
}

function Spark({data,red}){const mx=data.reduce((m,v)=>v>m?v:m,1);return<div style={{display:"flex",alignItems:"flex-end",gap:1,height:20}}>{data.map((v,i)=><div key={i} style={{background:red?"var(--red)":"var(--accent)",borderRadius:1,height:Math.max((v/mx)*20,1),width:6,opacity:i===data.length-1?1:.45}}/>)}</div>;}

// ─── Supabase helpers ───
async function chunk(arr, size, fn) {
  for (let i = 0; i < arr.length; i += size) {
    const res = await fn(arr.slice(i, i + size));
    if (res && res.error) throw res.error;
  }
}

// Delete all rows — loops because Supabase limits DELETE to 1000 rows per call
async function deleteAll(client, table, col) {
  let deleted = 0;
  while(true) {
    const { data, error } = await client.from(table).delete().neq(col, "__none__").select(col).limit(1000);
    if (error) throw error;
    if (!data || data.length === 0) break;
    deleted += data.length;
    if (data.length < 1000) break;
  }
  return deleted;
}

SKU: ${row.sku}

        sales:sl.map(r=>({sku:r.sku,gudang:r.gudang.toUpperCase(),date:r.date,qty:r.qty})),
        holidays:h.map(r=>r.date),
      });
      setConnErr("");
    } catch(e){
      console.error(e);
      setConnErr("Koneksi Supabase gagal: " + (e.message||"Cek URL dan Key di index.html"));
    }
    setLoading(false);
  },[sb, fetchAll]);

  useEffect(()=>{ if(sb) loadAll(); else setLoading(false); },[sb, loadAll]);
  useEffect(()=>{ if(!gd&&db.gudang.length) setGd(db.gudang[0].name); },[db.gudang,gd]);

  // ─── Compute reorder ───
  const rows = useMemo(()=>{
    if(!gd) return [];
    const g=db.gudang.find(x=>x.name===gd); if(!g) return [];
    const holSet=new Set(db.holidays);
    const gdSales=db.sales.filter(s=>s.gudang===gd&&!holSet.has(s.date));
    const bySku={};
    gdSales.forEach(s=>{if(!bySku[s.sku])bySku[s.sku]={};bySku[s.sku][s.date]=(bySku[s.sku][s.date]||0)+s.qty;});
    const stokMap={};
    db.stok.filter(s=>s.gudang===gd).forEach(s=>{stokMap[s.sku]=s.qty;});
    const allSkus=new Set([...Object.keys(stokMap),...Object.keys(bySku)]);

    // Build 7 calendar days: yesterday back to 7 days ago (exclude today)
    const today = new Date(); today.setHours(0,0,0,0);
    const last7dates = [];
    for(let i=1;i<=7;i++){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const k=dk(d);
      if(!holSet.has(k)) last7dates.unshift(k); // oldest first
    }

    const out=[];
    allSkus.forEach(sku=>{
      const mi=db.master.find(m=>m.sku===sku);const stock=stokMap[sku]||0;
      const sm=bySku[sku]||{};
      // Get sales for exactly the 7 calendar days (0 if no sale that day)
      const last7=last7dates.map(d=>sm[d]||0);
      const hasSales=last7.some(v=>v>0);
      const kf=kingFormula(last7,g.avgLT,g.maxLT,stock);
      const ta=analyzeTrend(last7,g.avgLT,g.maxLT,stock);
      out.push({sku,name:mi?mi.name:sku,kat:mi?mi.kat:"",stock,last7,last7dates,...kf,hasSales,...ta});
    });
    out.sort((a,b)=>{
      if(sort==="rop"){if(a.belowRop!==b.belowRop)return a.belowRop?-1:1;return b.oq-a.oq;}
      if(sort==="name")return a.name.localeCompare(b.name);
      if(sort==="stock")return a.stock-b.stock;
      if(sort==="avg")return b.avg-a.avg;
      if(sort==="dos")return a.dos-b.dos;return 0;
    });
    return out;
  },[db,gd,sort]);

  const fRows=useMemo(()=>{if(!q)return rows;const s=q.toLowerCase();return rows.filter(r=>r.name.toLowerCase().includes(s)||r.sku.toLowerCase().includes(s));},[rows,q]);
  const belowN=useMemo(()=>rows.filter(r=>r.belowRop).length,[rows]);

  // ─── File Upload & Validation ───
  const SCHEMAS = {

    gudang:   { label:"Gudang", minCols:3, headers:["Nama Gudang","Avg Lead Time","Max Lead Time"] },

  const processFile = (f) => {

    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, {type:"array", cellDates:true});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        // Extract actual values from Google Sheets IFERROR formulas + remove empty rows
        const clean = rows
          .map(r => r.map(c => extractCell(c)))
          .filter(r => r.some(c => c !== "" && c != null));
        setFile({name:f.name, size:f.size, rows:clean});
        validateFile(clean, iMode);
      } catch(err) { notify("File tidak bisa dibaca: "+err.message,"err"); }
    };
    reader.readAsArrayBuffer(f);

  const handleDrop = (e) => { e.preventDefault(); setDragOver(false); const f=e.dataTransfer.files[0]; if(f) processFile(f); };

  const clearFile = () => { setFile(null); setValidation(null); setRaw(null); if(fileRef.current) fileRef.current.value=""; };

  const validateFile = (rows, mode) => {
    const schema = SCHEMAS[mode];
    const errors = [];
    let data = [];

    if (!rows.length) { setValidation({ok:false, errors:["File kosong"], data:[], count:0}); return; }

    // Detect and skip header row
    let startRow = 0;
    const firstCell = String(rows[0]?.[0]||"").trim().toUpperCase();
    if (["SKU","POC","NAMA","TANGGAL","SKU CODE"].includes(firstCell)) startRow = 1;

    const dataRows = rows.slice(startRow);
    if (!dataRows.length) { setValidation({ok:false, errors:["Tidak ada data (hanya header)"], data:[], count:0}); return; }

    // Check column count
    const colCount = dataRows[0].length;
    if (mode === "master" && colCount !== 4 && colCount !== 6 && colCount < 4) {
      errors.push("Kolom tidak sesuai: ditemukan "+colCount+" kolom. Butuh 4 (template) atau 6 (Produk Detail).");
    } else if (mode !== "master" && colCount < schema.minCols) {
      errors.push("Kolom tidak sesuai: ditemukan "+colCount+" kolom, minimal "+schema.minCols+". Format: "+schema.headers.join(" | "));
    }

    // Parse data per mode
    const seen = new Set();
    let dupCount = 0;
    let emptyCount = 0;

    if (mode === "master") {
      dataRows.forEach((r,i) => {
        let sku,name,kat,hpp;
        if (r.length >= 6) { sku=String(r[0]||"").trim(); name=String(r[1]||"").trim(); kat=String(r[3]||"").trim(); hpp=parseRp(r[5]); }
        else { sku=String(r[0]||"").trim(); name=String(r[1]||"").trim(); kat=String(r[2]||"").trim(); hpp=parseRp(r[3]); }
        if (!sku) { emptyCount++; return; }
        if (seen.has(sku)) { dupCount++; return; }
        seen.add(sku);
        data.push({sku,name,kategori:kat,hpp});
      });
    } else if (mode === "gudang") {
      dataRows.forEach((r) => {
        const name=String(r[0]||"").trim().toUpperCase(); if (!name) { emptyCount++; return; }
        if (seen.has(name)) { dupCount++; return; }
        seen.add(name);
        const aLT=parseInt(r[1])||4, mLT=parseInt(r[2])||5;
        if (aLT > mLT) errors.push("Gudang '"+name+"': Avg LT ("+aLT+") > Max LT ("+mLT+")");
        data.push({name,avg_lt:aLT,max_lt:mLT});
      });
    } else if (mode === "stok") {
      dataRows.forEach((r) => {
        const sku=String(r[0]||"").trim(), gudang=String(r[2]||"").trim().toUpperCase();
        if (!sku) { emptyCount++; return; }
        if (!gudang) { errors.push("Baris SKU '"+sku+"': kolom Gudang kosong"); return; }
        const key=sku+"|"+gudang;
        if (seen.has(key)) { dupCount++; return; }
        seen.add(key);
        data.push({sku,gudang,qty:parseInt(r[3])||0,updated_at:new Date().toISOString()});
      });
    } else if (mode === "raw") {
      const dateMap = new Map();
      const gudangSet = new Set();
      const skuSet = new Set();
      let dateErrors = 0;
      dataRows.forEach((r) => {
        let sku=String(r[0]||"").trim(); if(sku.includes("\n")) sku=sku.split("\n")[0].trim();
        if (!sku) { emptyCount++; return; }
        let gudang,dateVal,qty;
        // Detect format: 4 cols = SKU|Gudang|Date|Qty, 3 cols = SKU|Date|Qty
        const col2 = r[2]; const col2parsed = parseDate(col2);
        if (r.length>=4 && col2parsed) { gudang=String(r[1]||"").trim().toUpperCase(); dateVal=col2; qty=parseInt(r[3])||0; }
        else { gudang=""; dateVal=r[1]; qty=parseInt(r[2])||0; }
        const d=parseDate(dateVal);
        if(!d){ dateErrors++; if(dateErrors<=3) errors.push("Tanggal tidak dikenali: '"+String(dateVal)+"' (SKU: "+sku+")"); return; }
        const k=dk(d); dateMap.set(k,d);
        if(gudang) gudangSet.add(gudang);
        skuSet.add(sku);
        data.push({sku,gudang,date:k,qty});
      });
      if(dateErrors>3) errors.push("...dan "+(dateErrors-3)+" tanggal error lainnya");
      // Build raw state for date exclusion UI
      const sortedDates=[...dateMap.entries()].sort((a,b)=>a[1]-b[1]).map(e=>({key:e[0],d:e[1]}));
      const dateRange = sortedDates.length>0 ? fmtD(sortedDates[0].d)+" "+sortedDates[0].d.getFullYear()+" → "+fmtD(sortedDates[sortedDates.length-1].d)+" "+sortedDates[sortedDates.length-1].d.getFullYear() : "-";
      setRaw({entries:data,sortedDates,total:data.length,hasGd:gudangSet.size>0,
        gudangList:[...gudangSet].sort(), skuCount:skuSet.size, dateRange});
      setExD(new Set());
    } else if (mode === "holidays") {
      dataRows.forEach((r) => {
        const s=String(r[0]||"").trim(); if (!s) { emptyCount++; return; }
        const d=parseDate(s); if(!d){ errors.push("Tanggal tidak dikenali: '"+s+"'"); return; }
        const k=dk(d);
        if (seen.has(k)) { dupCount++; return; }
        seen.add(k);
        data.push({date:k});
      });
    }

    if (dupCount > 0) errors.push(dupCount+" baris duplikat dihapus otomatis.");
    if (emptyCount > 0) errors.push(emptyCount+" baris kosong di-skip.");
    if (data.length === 0 && errors.length === 0) errors.push("Tidak ada data valid yang ditemukan.");

    const hasBlocker = errors.some(e => e.includes("Kolom tidak sesuai") || e.includes("Tidak ada data valid"));

        await chunk(d, 200, batch => sb.from("gudang").insert(batch));
      } else if(iMode==="stok"){
        await deleteAll(sb, "stok", "sku");
        await chunk(d, 200, batch => sb.from("stok").insert(batch));

  const handleImportRaw=async()=>{
    if(!raw||!sb||!validation) return;

      const filtered=raw.entries.filter(e=>!exD.has(e.date));
      let final=[];
      if(!raw.hasGd){
        const stokBySku={};db.stok.forEach(s=>{if(!stokBySku[s.sku])stokBySku[s.sku]=[];stokBySku[s.sku].push(s.gudang);});
        filtered.forEach(e=>{const gs=stokBySku[e.sku]||(db.gudang.length?[db.gudang[0].name]:[]);gs.forEach(g=>final.push({sku:e.sku,gudang:g,date:e.date,qty:e.qty}));});
      } else { final=filtered.map(e=>({sku:e.sku,gudang:e.gudang,date:e.date,qty:e.qty})); }
      const importDates=[...new Set(raw.sortedDates.filter(d=>!exD.has(d.key)).map(d=>d.key))];
      for(const dt of importDates){ let more=true; while(more){ const r=await sb.from("sales").delete().eq("date",dt).select("sku").limit(1000); more=r.data&&r.data.length===1000; } }
      const uniqueSales = dedup(final, r=>r.sku+"|"+r.gudang+"|"+r.date);
      await chunk(uniqueSales, 200, batch => sb.from("sales").insert(batch));
      if(exD.size>0){ const hols=dedup([...exD].map(d=>({date:d})), r=>r.date); await sb.from("holidays").upsert(hols, {onConflict:"date",ignoreDuplicates:true}); }
      await loadAll();
      clearFile(); notify(uniqueSales.length+" sales diimport");
    } catch(e){ notify("Error: "+e.message,"err"); }
    setImporting(false);
  };

    const handleExport=()=>{

    const r=rows.map(r=>[r.sku,r.name,r.stock,r.avg.toFixed(1),r.max,r.ss,r.rop,r.oq,r.dos===Infinity?"∞":r.dos.toFixed(1),r.belowRop?"REORDER":"AMAN"].join("\t"));

  // ─── Error Screen ───
  if(connErr){

        <div className="it">
          {[["master","Master SKU"],["gudang","Gudang"],["stok","Stok per Gudang"],["raw","Sales Harian"],["holidays","Hari Libur"]].map(([k,l])=>
            <div key={k} className={"itm"+(iMode===k?" on":"")} onClick={()=>{setIMode(k);clearFile();}}>{l}</div>
          )}
        </div>

        <div className="cd"><div className="cb">
          {/* Format info */}
          {iMode==="master"&&<div className="ib"><div className="ib-t">Sheet: Master SKU</div><div className="ht">
            Format 4 kolom: <code>SKU | Nama | Kategori | HPP</code><br/>
            Atau 6 kolom dari Produk Detail: <code>SKU | Nama | Produk Utama | Kategori | Atribut | HPP</code><br/>
            ⚠️ Data lama akan <b>ditimpa</b>. Header otomatis di-skip.
          </div></div>}
          {iMode==="gudang"&&<div className="ib"><div className="ib-t">Sheet: Gudang</div><div className="ht">Format: <code>Nama Gudang | Avg Lead Time | Max Lead Time</code></div></div>}
          {iMode==="stok"&&<div className="ib"><div className="ib-t">Sheet: Stok per Gudang</div><div className="ht">Format: <code>SKU | Nama | Gudang | Stok Aktual</code></div></div>}
          {iMode==="raw"&&<div className="ib"><div className="ib-t">Sheet: Sales Harian</div><div className="ht">
            <b>Dgn gudang (4 kolom):</b> <code>SKU | Gudang | Tanggal | Qty</code><br/>
            <b>Tanpa gudang (3 kolom):</b> <code>SKU | Tanggal | Qty</code><br/>
            Upload → validasi → exclude hari libur → Import
          </div></div>}
          {iMode==="holidays"&&<div className="ib"><div className="ib-t">Sheet: Hari Libur</div><div className="ht">Format: <code>Tanggal</code> (1 kolom, format: 1 Mar 2026)</div></div>}

          {/* Drop Zone */}
          {!file&&<div className={"dropzone"+(dragOver?" over":"")}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop} onClick={()=>fileRef.current?.click()}>
            <div className="dz-icon">📂</div>
            <div className="dz-text">Drag file Excel di sini, atau klik untuk browse</div>
            <div className="dz-sub">Format: .xlsx, .xls, .csv</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handleFileSelect}/>
          </div>}

          {/* File info */}
          {file&&<div>
            <div className="dz-file">
              <span style={{fontSize:20}}>📄</span>
              <span className="name">{file.name}</span>
              <span className="size">{(file.size/1024).toFixed(0)} KB · {file.rows.length} baris</span>
              <button className="btn bsm bs" onClick={clearFile}>✕</button>
            </div>

            {/* Validation results */}
            {validation&&<div className="val-box">
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:16}}>{validation.ok?"✅":"❌"}</span>
                <span style={{fontWeight:700,fontSize:13,color:validation.ok?"var(--green)":"var(--red)"}}>
                  {validation.ok?validation.count+" data valid — siap import":"Validasi gagal"}
                </span>
              </div>
              {validation.errors.map((e,i)=><div key={i} className="val-row">
                <span className="val-icon">{e.includes("duplikat")||e.includes("di-skip")?"⚠️":"❌"}</span>
                <span style={{color:e.includes("duplikat")||e.includes("di-skip")?"var(--orange)":"var(--red)"}}>{e}</span>
              </div>)}
              {validation.ok&&validation.count>0&&<div className="val-row"><span className="val-icon">📊</span><span style={{color:"var(--f2)"}}>
                {iMode==="master"?"SKU: "+validation.count+" produk":
                 iMode==="gudang"?validation.count+" gudang":
                 iMode==="stok"?validation.count+" stok records":
                 iMode==="raw"?validation.count+" sales entries":
                 validation.count+" tanggal"}</span></div>}
            </div>}

            {/* Preview table (first 5 rows) */}
            {validation&&validation.ok&&validation.count>0&&iMode!=="raw"&&<div className="tw" style={{maxHeight:200,overflowY:"auto",marginBottom:12}}>
              <table><thead><tr>
                {iMode==="master"&&<><th>#</th><th>SKU</th><th>Nama</th><th>Kategori</th><th>HPP</th></>}
                {iMode==="gudang"&&<><th>#</th><th>Nama</th><th>Avg LT</th><th>Max LT</th></>}
                {iMode==="stok"&&<><th>#</th><th>SKU</th><th>Gudang</th><th>Qty</th></>}
                {iMode==="holidays"&&<><th>#</th><th>Tanggal</th></>}
              </tr></thead><tbody>
                {validation.data.slice(0,5).map((r,i)=><tr key={i}>
                  <td style={{color:"var(--f3)",fontSize:10}}>{i+1}</td>
                  {iMode==="master"&&<><td className="m" style={{fontSize:11}}>{r.sku}</td><td style={{fontWeight:600}}>{r.name}</td><td>{r.kategori}</td><td className="mr">{r.hpp||"-"}</td></>}
                  {iMode==="gudang"&&<><td style={{fontWeight:600}}>{r.name}</td><td className="mr">{r.avg_lt}</td><td className="mr">{r.max_lt}</td></>}
                  {iMode==="stok"&&<><td className="m" style={{fontSize:11}}>{r.sku}</td><td>{r.gudang}</td><td className="mr">{r.qty}</td></>}
                  {iMode==="holidays"&&<><td className="m">{r.date}</td></>}
                </tr>)}
                {validation.count>5&&<tr><td colSpan={5} style={{textAlign:"center",color:"var(--f3)",fontSize:11}}>...dan {validation.count-5} baris lainnya</td></tr>}
              </tbody></table>
            </div>}
          </div>}

          {/* Raw sales date exclusion */}
          {iMode==="raw"&&raw&&<div style={{marginTop:14}}>
            {/* Summary cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:12}}>
              <div className="sc"><div className="sc-l">Total Baris</div><div className="sc-v" style={{fontSize:18}}>{raw.total}</div></div>
              <div className="sc"><div className="sc-l">SKU Unik</div><div className="sc-v" style={{fontSize:18}}>{raw.skuCount}</div></div>
              <div className="sc"><div className="sc-l">Tanggal</div><div className="sc-v" style={{fontSize:18}}>{raw.sortedDates.length}</div></div>
              <div className="sc"><div className="sc-l">Per Gudang</div><div className="sc-v" style={{fontSize:18}}>{raw.hasGd?"Ya":"Tidak"}</div></div>
            </div>

            {/* Detailed validation info */}
            <div className="val-box">
              <div className="val-row"><span className="val-icon">📅</span><span><b>Periode:</b> {raw.dateRange}</span></div>
              {raw.hasGd&&<div className="val-row"><span className="val-icon">🏭</span><span><b>Gudang terdeteksi:</b> {raw.gudangList.join(", ")}</span></div>}
              <div className="val-row"><span className="val-icon">📦</span><span><b>SKU terdaftar di master:</b> {
                (()=>{const matched=new Set(); raw.entries.forEach(e=>{if(db.master.some(m=>m.sku===e.sku)) matched.add(e.sku);});
                  const total=raw.skuCount; const m=matched.size; const unm=total-m;
                  return <>{m} dari {total} cocok{unm>0&&<span style={{color:"var(--orange)"}}> · {unm} SKU tidak ditemukan di master</span>}</>;
                })()
              }</span></div>
              {raw.hasGd&&<div className="val-row"><span className="val-icon">📍</span><span><b>Gudang terdaftar:</b> {
                (()=>{const regGd=db.gudang.map(g=>g.name.toUpperCase()); const unknown=raw.gudangList.filter(g=>!regGd.includes(g.toUpperCase()));
                  return unknown.length>0?<span style={{color:"var(--orange)"}}>{unknown.join(", ")} belum terdaftar di master gudang</span>:<span style={{color:"var(--green)"}}>Semua gudang cocok ✓</span>;
                })()
              }</span></div>}
            </div>

            <div style={{fontWeight:600,fontSize:12,marginBottom:6}}>Klik untuk exclude hari libur:</div>
            <div className="dtg">{raw.sortedDates.map(({key,d})=>{
              const ex=exD.has(key);const we=d.getDay()===0||d.getDay()===6;
              return<div key={key} className="dt" onClick={()=>{const n=new Set(exD);if(ex)n.delete(key);else n.add(key);setExD(n);}}
                style={{background:ex?"var(--s3)":we?"rgba(232,148,58,.1)":"rgba(61,189,111,.1)",borderColor:ex?"var(--s3)":we?"var(--orange)":"var(--green)",opacity:ex?.45:1}}>
                <div className="d" style={{color:ex?"var(--f3)":"var(--fg)",textDecoration:ex?"line-through":"none"}}>{fmtD(d)}</div>
                <div className="n" style={{color:ex?"var(--f3)":we?"var(--orange)":"var(--f2)"}}>{DAYS[d.getDay()]}{ex?" ✕":" ✓"}</div>
              </div>;
            })}</div>
            <div className="ht">{raw.sortedDates.length-exD.size} aktif{exD.size>0&&<span style={{color:"var(--orange)"}}> · {exD.size} excluded</span>}</div>
          </div>}

          {/* Import buttons */}
          {file&&<div style={{marginTop:12,display:"flex",gap:8,alignItems:"center"}}>
            {iMode!=="raw"&&<React.Fragment>
              <button className="btn bp" onClick={handleImport} disabled={importing||!validation?.ok}>
                {importing?<><span className="spinner"/> Importing...</>:"📥 Import "+SCHEMAS[iMode].label}
              </button>
            </React.Fragment>}
            {iMode==="raw"&&raw&&<React.Fragment>
              <button className="btn bp" onClick={handleImportRaw} disabled={importing}>
                {importing?<><span className="spinner"/> Importing...</>:"📈 Import Sales"}
              </button>
            </React.Fragment>}
            <button className="btn bs" onClick={clearFile}>Reset</button>
          </div>}
        </div></div>

        <div className="cd"><div className="ch"><h3>Status Data (Supabase)</h3><button className="btn bsm bs" onClick={()=>{setLoading(true);loadAll();}}>🔄 Refresh</button></div><div className="cb">
          <table style={{fontSize:12}}><tbody>
            <tr onClick={()=>{setViewData(viewData==="master"?null:"master");setViewQ("");}} style={{cursor:"pointer"}}>
              <td style={{color:"var(--f3)",width:150}}>Master SKU</td><td className="m">{db.master.length} produk</td><td style={{textAlign:"right",color:"var(--accent)",fontSize:11}}>{viewData==="master"?"▲ Tutup":"▼ Lihat"}</td></tr>
            <tr><td style={{color:"var(--f3)"}}>Gudang</td><td className="m">{db.gudang.map(g=>g.name).join(", ")||"—"}</td><td></td></tr>
            <tr onClick={()=>{setViewData(viewData==="stok"?null:"stok");setViewQ("");}} style={{cursor:"pointer"}}>
              <td style={{color:"var(--f3)"}}>Stok</td><td className="m">{db.stok.length} records</td><td style={{textAlign:"right",color:"var(--accent)",fontSize:11}}>{viewData==="stok"?"▲ Tutup":"▼ Lihat"}</td></tr>
            <tr><td style={{color:"var(--f3)"}}>Sales</td><td className="m">{db.sales.length} records</td><td></td></tr>
            <tr><td style={{color:"var(--f3)"}}>Hari Libur</td><td className="m">{db.holidays.length} tanggal</td><td></td></tr>
          </tbody></table>

          {/* DATA VIEWER */}
          {viewData&&<div style={{marginTop:14}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
              <input placeholder={"Cari SKU / nama..."} value={viewQ} onChange={e=>setViewQ(e.target.value)} style={{width:250}}/>
              <span className="ht">{
                viewData==="master"
                  ? (viewQ ? db.master.filter(r=>r.sku.toLowerCase().includes(viewQ.toLowerCase())||r.name.toLowerCase().includes(viewQ.toLowerCase())).length : db.master.length) + " ditemukan"
                  : (viewQ ? db.stok.filter(r=>r.sku.toLowerCase().includes(viewQ.toLowerCase())||r.gudang.toLowerCase().includes(viewQ.toLowerCase())).length : db.stok.length) + " ditemukan"
              }</span>
            </div>
            <div className="tw" style={{maxHeight:400,overflowY:"auto"}}>
              {viewData==="master"&&<table><thead><tr>
                <th style={{width:30}}>#</th><th>SKU Code</th><th>Nama Barang</th><th>Kategori</th><th style={{textAlign:"right"}}>HPP</th>
              </tr></thead><tbody>
                {db.master.filter(r=>!viewQ||r.sku.toLowerCase().includes(viewQ.toLowerCase())||r.name.toLowerCase().includes(viewQ.toLowerCase())).map((r,i)=>
                  <tr key={r.sku}><td style={{color:"var(--f3)",fontSize:10}}>{i+1}</td><td className="m" style={{fontSize:11}}>{r.sku}</td><td style={{fontWeight:600}}>{r.name}</td><td>{r.kat}</td><td className="mr">{r.hpp?r.hpp.toLocaleString("id-ID"):"-"}</td></tr>
                )}
              </tbody></table>}
              {viewData==="stok"&&<table><thead><tr>
                <th style={{width:30}}>#</th><th>SKU Code</th><th>Gudang</th><th style={{textAlign:"right"}}>Qty</th>
              </tr></thead><tbody>
                {db.stok.filter(r=>!viewQ||r.sku.toLowerCase().includes(viewQ.toLowerCase())||r.gudang.toLowerCase().includes(viewQ.toLowerCase())).map((r,i)=>
                  <tr key={r.sku+r.gudang}><td style={{color:"var(--f3)",fontSize:10}}>{i+1}</td><td className="m" style={{fontSize:11}}>{r.sku}</td><td>{r.gudang}</td><td className="mr">{r.qty}</td></tr>
                )}
              </tbody></table>}
            </div>
          </div>}
        </div></div>
      </div>}

      {/* SETTINGS */}
      {tab==="settings"&&<div>
        <div className="ph"><h2>Pengaturan</h2></div>
        <div className="cd"><div className="ch"><h3><span className="dot dot-g"/>Supabase Connected</h3></div><div className="cb">
          <div className="ht">URL: <code>{SUPABASE_URL}</code></div>
          <div className="ht" style={{marginTop:4}}>Key: <code>{SUPABASE_KEY.slice(0,20)}...</code></div>
        </div></div>
        <div className="cd"><div className="ch"><h3>🤖 Claude AI (Optional)</h3></div><div className="cb">
          <div className="ht" style={{marginBottom:10}}>Untuk fitur "Ask AI" di tabel Reorder. Dapatkan API key dari <b>console.anthropic.com</b> → API Keys.</div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input placeholder="sk-ant-api03-..." defaultValue={localStorage.getItem("stockpilot-claude-key")||""} style={{flex:1,fontFamily:"var(--mono)",fontSize:11}}
              onBlur={e=>{const v=e.target.value.trim();if(v)localStorage.setItem("stockpilot-claude-key",v);else localStorage.removeItem("stockpilot-claude-key");notify(v?"API Key disimpan":"API Key dihapus");}} />
          </div>
          <div className="ht" style={{marginTop:6}}>Key disimpan di browser lokal. Tanpa key, fitur statistik (Trend, Alert, Adj Qty) tetap berjalan — hanya tombol 🤖 yang butuh key.</div>
        </div></div>
        <div className="cd"><div className="ch"><h3>King Formula</h3></div><div className="cb"><div className="fx">
          Safety Stock = (Max Sales 7d × Max LT) − (Avg Sales 7d × Avg LT)<br/>
          ROP = (Avg Sales 7d × Avg LT) + Safety Stock<br/>
          Order Qty = Avg Sales 7d × (Max LT + 1) + Safety Stock − Stok<br/><br/>
          <span style={{color:"var(--f3)"}}>// LT per gudang · +1 = review period harian · 7 hari kerja terakhir</span>
        </div></div></div>
        <div className="cd"><div className="ch"><h3>Workflow</h3></div><div className="cb"><div className="ht" style={{lineHeight:2}}>
          <b>Harian (staff):</b> Buka app → pilih gudang → baris merah = pesan<br/>
          <b>Periodik (admin):</b> Tab Import → Master SKU → Gudang → Sales → Stok → Hari Libur
        </div></div></div>
        <div className="cd" style={{borderColor:"#4a1c1c"}}><div className="ch"><h3 style={{color:"var(--red)"}}>Danger Zone</h3></div><div className="cb" style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn bd" onClick={async()=>{if(!confirm("Hapus SEMUA data di Supabase?"))return;
            await deleteAll(sb,"sales","sku");await deleteAll(sb,"stok","sku");
            await deleteAll(sb,"master_sku","sku");await deleteAll(sb,"gudang","name");
            await deleteAll(sb,"holidays","date");await loadAll();notify("Semua data dihapus");
          }}>Hapus Semua</button>
          <button className="btn bs" onClick={async()=>{if(!confirm("Hapus sales?"))return;await deleteAll(sb,"sales","sku");await loadAll();notify("Sales dihapus");}}>Hapus Sales</button>
          <button className="btn bs" onClick={async()=>{if(!confirm("Hapus stok?"))return;await deleteAll(sb,"stok","sku");await loadAll();notify("Stok dihapus");}}>Hapus Stok</button>
        </div></div>
      </div>}
    </div>

    {/* AI MODAL */}
    {aiModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,backdropFilter:"blur(4px)"}} onClick={e=>{if(e.target===e.currentTarget){setAiModal(null);setAiResult("");}}}>
      <div style={{background:"var(--s1)",border:"1px solid var(--s2)",borderRadius:12,width:560,maxWidth:"92vw",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{padding:"18px 22px",borderBottom:"1px solid var(--s2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><h3 style={{fontSize:15,fontWeight:700}}>🤖 AI Analysis</h3><div style={{fontSize:11,color:"var(--f3)",marginTop:2}}>{aiModal.sku} — {aiModal.name}</div></div>
          <button className="btn bsm bs" onClick={()=>{setAiModal(null);setAiResult("");}}>✕</button>
        </div>
        <div style={{padding:22}}>
          {/* Stats summary */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:16}}>
            <div className="sc"><div className="sc-l">Stok</div><div className="sc-v" style={{fontSize:18}}>{aiModal.stock}</div></div>
            <div className="sc"><div className="sc-l">Avg 7d</div><div className="sc-v" style={{fontSize:18}}>{fmt(aiModal.avg)}</div></div>
            <div className="sc"><div className="sc-l">Trend</div><div className="sc-v" style={{fontSize:18}}>{aiModal.trend}</div></div>
            <div className="sc"><div className="sc-l">King Qty</div><div className="sc-v" style={{fontSize:18}}>{aiModal.oq||"-"}</div></div>
            <div className="sc" style={{borderColor:"var(--accent)"}}><div className="sc-l">Adj Qty</div><div className="sc-v" style={{fontSize:18,color:"var(--accent2)"}}>{aiModal.adjQty||"-"}</div></div>
          </div>
          {aiModal.anomaly&&<div style={{background:"var(--redbg)",border:"1px solid rgba(229,77,77,.2)",borderRadius:8,padding:12,marginBottom:16,fontSize:12}}>
            {aiModal.anomaly.icon} <b>Anomali terdeteksi:</b> {aiModal.anomaly.msg}
          </div>}
          {/* AI Response */}
          <div style={{background:"var(--bg)",border:"1px solid var(--s2)",borderRadius:8,padding:16,minHeight:100}}>
            {aiLoading?<div style={{display:"flex",alignItems:"center",gap:8,color:"var(--f3)"}}><span className="spinner"/>Menganalisis...</div>
            :aiResult?<div style={{fontSize:12.5,lineHeight:1.8,whiteSpace:"pre-wrap",color:"var(--fg)"}}>{aiResult}</div>
            :<div style={{color:"var(--f3)",fontSize:12}}>Klik tombol di bawah untuk meminta analisis AI.</div>}
          </div>
          <div style={{marginTop:12,display:"flex",gap:8}}>
            <button className="btn bp" onClick={()=>askAI(aiModal)} disabled={aiLoading}>{aiLoading?"Analyzing...":"🤖 Analisis AI"}</button>
            {aiResult&&<button className="btn bs" onClick={()=>{navigator.clipboard.writeText(aiResult);notify("Copied!");}}>📋 Copy</button>}
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
